services:
  - type: web
    name: qoldan-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_POOL_MIN
        value: "0"
      - key: DATABASE_POOL_MAX
        value: "10"
      - key: TELEGRAM_MODE
        value: webhook
      - key: TELEGRAM_WEBHOOK_PATH
        value: /api/telegram/webhook
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: FILE_STORAGE_DRIVER
        value: local
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: ALLOWED_ORIGIN_SUFFIXES
        value: .vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_FALLBACK_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        sync: false
